<style>

const articles = [
  {id:'beyond-empires', category:'history', type:'Featured Article', date:'18 May 2025', read:'18 min read', title:'Beyond Empires: Civilizational Thought in Pre-Colonial India', subtitle:'Revisiting knowledge systems, statecraft, and cultural continuities that shaped a timeless civilizational vision.', image:heroImage, takeaways:['Civilizational continuity cannot be reduced to dynasties or territorial empires alone.','Pre-colonial knowledge systems such as Nyaya, Ayurveda, Arthashastra, and aesthetics were sophisticated intellectual disciplines.','Civilizational memory survives through institutions, texts, pedagogy, ritual, place, and community.','The real task is not nostalgia but the reconstruction of living intellectual capacity.'], body:`
<p>The history of a civilization cannot be measured solely by the rise and fall of its empires. Empires conquer territory; civilizations transmit meaning. When we ask what endured through the many political transformations of the Indian subcontinent, we discover the persistence of intellectual and cultural forms that defied the logic of political succession.</p>
<h2>The architecture of continuity</h2>
<p>What makes Indian civilization unusual in the world-historical record is not only the grandeur of its political formations, but the durability of its intellectual and cultural institutions. Pedagogical lineages, temple economies, textual commentaries, oral memory, guilds, and community forms preserved knowledge even when states rose and collapsed.</p>
<blockquote>A civilization is not a state. It is a pattern of feeling, thinking, remembering, and acting that outlasts any particular political arrangement.</blockquote>
<p>The Sanskrit intellectual tradition did not require a single empire to function. When one patronage structure declined, another emerged. Commentaries, refutations, schools, debates, and pedagogical practices carried the tradition forward because its institutional basis was not merely administrative.</p>
<h2>Statecraft as civilizational practice</h2>
<p>The Arthashastra of Kauṭilya is often read as a manual of political realism. It is better understood as a serious inquiry into the relationship between artha, dharma, welfare, force, administration, and human flourishing. The ruler’s legitimacy is not self-justifying. It is tested through the security and prosperity of the people.</p>
<blockquote>In the happiness of his subjects lies the king’s happiness; in their welfare his welfare.</blockquote>
<h2>Knowledge beyond the modern academy</h2>
<p>Pre-colonial India did not possess a single centralized university system in the modern sense. It possessed an ecology of knowledge communities. Brahminical scholasticism, medical traditions, astronomical and mathematical schools, craft lineages, poetic theory, temple architecture, and ritual science formed a distributed intellectual civilization.</p>
<p>The task today is not to treat these as museum objects. It is to ask what it would mean to re-enter them as living disciplines, capable of dialogue with modern science, statecraft, sociology, psychology, and philosophy.</p>
<h2>Colonial rupture and recovery</h2>
<p>The colonial encounter did not merely change political sovereignty. It altered the conditions under which knowledge was recognized, transmitted, validated, and institutionalized. Civilizational recovery therefore requires more than emotion. It requires method, archives, scholarship, and the courage to think from inherited categories without becoming trapped by them.</p>`, refs:['Kauṭilya, Arthashastra, critical editions and translations.','Dharampal, The Beautiful Tree: Indigenous Indian Education in the Eighteenth Century.','Sheldon Pollock, The Language of the Gods in the World of Men.']},
  {id:'maritime-chessboard', category:'geopolitics', type:'Analysis', date:'24 May 2025', read:'16 min read', title:'The New Maritime Chessboard: Power, Ports, and the Indo-Pacific Order', subtitle:'How infrastructure, technology, and alliances are reshaping maritime power in the 21st century.', image:mapImage, takeaways:['Maritime infrastructure is now a form of geopolitical leverage.','Ports, cables, shipping routes, and naval access shape national power.','Middle powers and minilateral coalitions are increasingly central to the Indo-Pacific order.','Data, logistics, and sea power are now part of the same strategic system.'], body:`
<p>The strategic center of gravity of the 21st century has returned to the sea. Energy flows, data cables, container routes, naval access, island chains, and port infrastructure now define power as much as land borders do.</p>
<h2>The maritime century returns</h2>
<p>Maritime routes connect the economic lifelines of nations to distant markets. Control over sea lanes does not merely secure trade; it shapes diplomatic leverage, military reach, and technological resilience.</p>
<blockquote>Control the seas, and you control the lifeblood of civilization.</blockquote>
<h2>Ports as strategic assets</h2>
<p>Ports are no longer merely commercial nodes. They are dual-use assets with logistical, intelligence, economic, and military implications. A port can become an entry point for investment, dependence, surveillance, and strategic alignment.</p>
<h2>India and the Indo-Pacific frame</h2>
<p>For India, the Indo-Pacific is not a borrowed slogan. It is a geographic reality. From the Arabian Sea to the Bay of Bengal, from island territories to shipping corridors, India’s civilizational geography has always been maritime as well as continental.</p>`, refs:['Alfred Thayer Mahan, The Influence of Sea Power upon History.','Ministry and strategic policy documents on the Indo-Pacific.']},
  {id:'what-is-anvikshiki', category:'philosophy', type:'Philosophy Note', date:'2 June 2025', read:'10 min read', title:'What Ānvīkṣikī Means: Inquiry Before Ideology', subtitle:'A short philosophical note on investigation, reflective examination, and the discipline of reasoning.', image:'linear-gradient(135deg, rgba(168,61,93,.28), rgba(166,123,45,.18)), url(https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1200&q=80)', takeaways:['Ānvīkṣikī is not merely logic; it is disciplined investigation.','Inquiry requires patience before reaction.','A civilizational platform must examine before it refutes.'], body:`
<p>Ānvīkṣikī names a discipline of inquiry: looking again, examining deeply, reasoning carefully, and testing claims before accepting them. For a modern intellectual platform, the word is not decorative. It is a method.</p>
<h2>Inquiry before ideology</h2>
<p>Most political platforms begin with conclusion. A serious platform begins with question. It asks what is being assumed, what is being hidden, what evidence is being used, and what category is shaping the debate.</p>
<blockquote>To inquire is to refuse both blind reaction and inherited contempt.</blockquote>
<h2>The philosophical posture</h2>
<p>Philosophy here is not a vague aesthetic. It means method. It means concepts. It means the ability to distinguish truth from performance, evidence from slogan, tradition from sentiment, and civilizational continuity from mere nostalgia.</p>`, refs:['Traditional discussions of Ānvīkṣikī in Indian intellectual history.']},
  {id:'mind-layers', category:'psychology', type:'Essay', date:'12 June 2025', read:'9 min read', title:'Consciousness and the Layers of Mind', subtitle:'Reading manas, buddhi, chitta, and ahamkara beside modern cognitive models.', image:'linear-gradient(135deg, rgba(29,80,96,.25), rgba(114,122,85,.18)), url(https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=1200&q=80)', takeaways:['Indian psychology often treats mind as layered, not flat.','Attention, memory, identity, and discernment can be analyzed separately.','Modern cognitive science can dialogue with older models without reducing them.'], body:`<p>The Indian psychological vocabulary does not describe the mind as one simple thing. It speaks through layers and functions: manas, buddhi, chitta, ahamkara. This offers a subtle grammar for experience, attention, and identity.</p><h2>The layered self</h2><p>A layered model allows us to ask better questions. Is this thought memory, habit, perception, judgement, or identity? That distinction matters for psychology, ethics, and self-discipline.</p>`, refs:['Classical Yoga and Sāṃkhya discussions of mind.']},
  {id:'society-institutions', category:'sociology', type:'Sociology', date:'9 June 2025', read:'11 min read', title:'Institutions, Community, and the Social Memory of India', subtitle:'A sociological reading of how communities preserve meaning across generations.', image:'linear-gradient(135deg, rgba(114,122,85,.22), rgba(168,61,93,.14)), url(https://images.unsplash.com/photo-1518005020951-eccb494ad742?w=1200&q=80)', takeaways:['Social memory lives through institutions.','Communities can preserve knowledge outside formal state systems.','Modern sociology must study continuity as much as rupture.'], body:`<p>Society is not just population. It is a network of rituals, institutions, obligations, memories, disputes, and inherited forms. To understand India sociologically, we must study continuity without romanticizing it.</p><h2>Social forms as memory</h2><p>Every institution stores time. A temple, family practice, craft lineage, local festival, or association can preserve ways of seeing the world that are older than the modern state.</p>`, refs:['Sociological literature on institutions and memory.']},
  {id:'science-method', category:'science', type:'Science', date:'7 June 2025', read:'8 min read', title:'Science, Method, and the Discipline of Doubt', subtitle:'A short essay on why real inquiry requires method, humility, and repeatability.', image:'linear-gradient(135deg, rgba(29,80,96,.28), rgba(211,168,93,.14)), url(https://images.unsplash.com/photo-1532094349884-543bc11b234d?w=1200&q=80)', takeaways:['Science is not a tribe; it is disciplined method.','Civilizational inquiry must respect evidence and procedure.','Modern science and inherited knowledge require careful dialogue.'], body:`<p>Science is not merely a collection of facts. It is a discipline of doubt, measurement, falsification, replication, and correction. A civilizational platform must not use tradition as an excuse to abandon method.</p><h2>The method matters</h2><p>Real confidence comes from procedure, not loudness. Evidence, humility, and correction make inquiry stronger.</p>`, refs:['General philosophy of science and method.']}
];

function initIcons(){
 document.querySelectorAll('[data-icon]').forEach(el=>{ const key = el.getAttribute('data-icon'); el.innerHTML = key === 'emblem-mini' ? svgIcon('emblemMini') : svgIcon(key); });
 const d = document.getElementById('desktopEmblem'); if(d) d.innerHTML = emblem('emblem sm');
 const dayTop = document.getElementById('dayTop'), nightTop = document.getElementById('nightTop'); if(dayTop) dayTop.innerHTML=svgIcon('science'); if(nightTop) nightTop.innerHTML='<svg class="svg-icon" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"></path></svg>';

function applyPrefs(){
 document.documentElement.dataset.theme = state.theme;
 document.documentElement.dataset.density = state.density;
 document.documentElement.dataset.motion = state.motion;
 document.documentElement.dataset.reader = state.reader;
 document.documentElement.dataset.accent = state.accent;
 document.querySelector('meta[name="theme-color"]').setAttribute('content', state.theme === 'night' ? '#071115' : '#fbf3e4');
 document.querySelectorAll('.theme-toggle button').forEach(b=>b.classList.remove('active'));
 document.querySelectorAll(state.theme === 'day' ? '[aria-label*="Day"], #dayTop' : '[aria-label*="Night"], #nightTop').forEach(b=>b.classList.add('active'));
}
function persistPrefs(){ localStorage.setItem('anv_theme',state.theme); localStorage.setItem('anv_density',state.density); localStorage.setItem('anv_motion',state.motion); localStorage.setItem('anv_reader',state.reader); localStorage.setItem('anv_accent',state.accent); }
function setTheme(v){ state.theme=v; persistPrefs(); applyPrefs(); renderSettingsButtons(); }
function setPref(k,v){ state[k]=v; persistPrefs(); applyPrefs(); renderSettingsButtons(); toast('Updated'); }
function route(view, opt={}){ state.view=view; if(opt.category) state.category = opt.category; if(opt.article) state.article = opt.article; window.scrollTo({top:0,behavior:'smooth'}); render(); }
function activeNav(){ document.querySelectorAll('.bottom-nav button').forEach(b=>b.classList.toggle('active', b.dataset.nav === state.view || (state.view==='category' && b.dataset.nav==='search'))); }
function isSaved(id){ return state.saved.some(x=>x.id===id); }
function toggleSave(item){ const exists=isSaved(item.id); state.saved = exists ? state.saved.filter(x=>x.id!==item.id) : [{id:item.id,title:item.title,category:item.category,date:item.date,image:item.image}, ...state.saved]; localStorage.setItem('anv_saved',JSON.stringify(state.saved)); toast(exists?'Removed from saved':'Saved'); render(); }
function toast(msg){ const wrap=document.getElementById('toasts'); const el=document.createElement('div'); el.className='toast'; el.textContent=msg; wrap.appendChild(el); setTimeout(()=>{el.remove()},2400); }
function shareArticle(a){ const url=location.href.split('#')[0]+'#'+a.id; if(navigator.share){ navigator.share({title:a.title,text:a.subtitle,url}).catch(()=>{}); } else { navigator.clipboard.writeText(url).then(()=>toast('Link copied')); } }
function copyCitation(a){ const c=`Ānvīkṣikī Editorial. "${a.title}." Ānvīkṣikī, ${a.date}.`; navigator.clipboard.writeText(c).then(()=>toast('Citation copied')); }
function listenArticle(a){ if(!('speechSynthesis' in window)){ toast('Text-to-speech not supported'); return; } speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(`${a.title}. ${a.subtitle}`); u.rate=.92; u.pitch=.92; speechSynthesis.speak(u); toast('Reading started'); }
function h(s){ return String(s||'').replace(/[&<>"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function categoryTile(t, desktop=false){ return `<a href="#" class="category-tile ${t.id}" onclick="route('${t.id==='papers'?'papers':t.id==='archive'?'archive':'category'}',{category:'${t.id}'});return false;" aria-label="${h(t.label)}"><div class="category-icon">${svgIcon(t.icon)}</div><span>${h(t.label)}</span></a>`; }
function paperCard(p){ return `<article class="paper-card" onclick="route('papers')"><div class="thumb-mini">${svgIcon('papers')}</div><div><span class="tag">${h(p.tag)}</span><h3>${h(p.title)}</h3><div class="meta">${h(p.read)}</div></div></article>`; }
function renderHome(){ const a=articles[0]; return `<section class="mobile-home mobile-only"><header class="mobile-header"><button class="icon-button" onclick="route('search')" aria-label="Search">${svgIcon('search')}</button><div class="mobile-brand">${emblem('emblem float')}<div class="wordmark"><span class="deva">आन्वीक्षिकी</span><span class="roman">ĀNVĪKṢIKĪ</span></div></div><div style="display:flex;justify-content:flex-end"><div class="theme-toggle"><button onclick="setTheme('day')" aria-label="Day mode">${svgIcon('science')}</button><button onclick="setTheme('night')" aria-label="Night mode"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"></path></svg></button></div></div></header>${heroCard(a)}<nav class="category-grid" aria-label="Knowledge sections">${topics.map(t=>categoryTile(t)).join('')}</nav><div class="mobile-search-strip"><button class="pill-button" onclick="route('search')">${svgIcon('search')} Search essays, papers, ideas...</button><button class="icon-button" onclick="route('settings')" aria-label="Settings">${svgIcon('settings')}</button></div></section><section class="desktop-home desktop-only"><div class="desktop-hero"><div class="desktop-hero-copy"><div class="eyebrow">Featured Article</div><h1>${h(a.title)}</h1><p>${h(a.subtitle)}</p><div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:32px"><button class="primary-button" onclick="route('article',{article:'${a.id}'})">${svgIcon('read')} Read Article</button><button class="ghost-button" onclick='toggleSave(${JSON.stringify({id:a.id,title:a.title,category:a.category,date:a.date,image:a.image})})'>${svgIcon('saved')} Save</button></div></div><div class="desktop-hero-visual" style="--hero-bg:${a.image}"></div></div><nav class="desktop-categories" aria-label="Knowledge sections">${topics.slice(0,6).map(t=>categoryTile(t,true)).join('')}</nav><div class="section-row"><div class="section-title"><h2>Latest Papers</h2><a href="#" onclick="route('papers');return false;">View all papers →</a></div><div class="card-grid">${papers.map(paperCard).join('')}</div></div></section>`; }
function heroCard(a){ return `<article class="hero-card" onclick="route('article',{article:'${a.id}'})"><div class="hero-visual" style="--hero-bg:${a.image}"><div class="hero-copy"><span class="badge">${svgIcon('read')} Latest Article</span><div class="date">${h(a.date)} · ${h(a.read)}</div><h1 class="hero-title">${h(a.title)}</h1><p class="hero-excerpt">${h(a.subtitle)}</p></div></div><div class="hero-actions"><button onclick="event.stopPropagation();route('article',{article:'${a.id}'})">${svgIcon('read')} Read</button><button class="${isSaved(a.id)?'saved':''}" onclick='event.stopPropagation();toggleSave(${JSON.stringify({id:a.id,title:a.title,category:a.category,date:a.date,image:a.image})})'>${svgIcon('saved')} Save</button><button onclick="event.stopPropagation();shareArticle(articles.find(x=>x.id==='${a.id}'))">${svgIcon('share')} Share</button><button onclick="event.stopPropagation();listenArticle(articles.find(x=>x.id==='${a.id}'))">${svgIcon('listen')} Listen</button></div></article>`; }
function renderArticle(id){ const a = articles.find(x=>x.id===id) || articles[0]; const related = articles.filter(x=>x.id!==a.id).slice(0,3); return `<article class="article-shell" data-section="${a.category}"><div class="reader-layout with-rail"><div class="reader-main"><div class="reader-top"><button class="ghost-button" onclick="route('home')">← Home</button><span class="meta">${h(a.category)} · ${h(a.read)}</span></div><div class="eyebrow">${h(a.type)} · ${h(a.category)}</div><h1 class="reader-title">${h(a.title)}</h1><p class="reader-subtitle">${h(a.subtitle)}</p><div class="meta">Ānvīkṣikī Editorial · ${h(a.date)}</div><div class="reader-actions"><button class="ghost-button ${isSaved(a.id)?'saved':''}" onclick='toggleSave(${JSON.stringify({id:a.id,title:a.title,category:a.category,date:a.date,image:a.image})})'>${svgIcon('saved')} ${isSaved(a.id)?'Saved':'Save'}</button><button class="ghost-button" onclick="shareArticle(articles.find(x=>x.id==='${a.id}'))">${svgIcon('share')} Share</button><button class="ghost-button" onclick="listenArticle(articles.find(x=>x.id==='${a.id}'))">${svgIcon('listen')} Listen</button><button class="ghost-button" onclick="copyCitation(articles.find(x=>x.id==='${a.id}'))">${svgIcon('papers')} Cite</button></div><div class="reader-hero" style="--hero-bg:${a.image}"></div><section class="takeaways"><h3>Key Takeaways</h3><ul>${a.takeaways.map(t=>`<li>${h(t)}</li>`).join('')}</ul></section><section class="article-content">${a.body}</section><section class="references"><h3>References</h3><ol>${(a.refs||[]).map(r=>`<li>${h(r)}</li>`).join('')}</ol></section></div><aside class="reader-rail"><div class="rail-card"><h4>Reading Tools</h4><div style="display:grid;gap:8px"><button class="ghost-button" onclick="setPref('reader','narrow')">Narrow reader</button><button class="ghost-button" onclick="setPref('reader','wide')">Wide reader</button></div></div><div class="rail-card"><h4>Related Reading</h4>${related.map(r=>`<div class="result-card" style="grid-template-columns:44px 1fr;padding:10px;margin-bottom:8px" onclick="route('article',{article:'${r.id}'})"><div class="thumb-mini" style="width:44px;height:44px">${svgIcon(topics.find(t=>t.id===r.category)?.icon||'papers')}</div><div><h3 style="font-size:15px">${h(r.title)}</h3><div class="meta">${h(r.category)} · ${h(r.read)}</div></div></div>`).join('')}</div></aside></div></article>`; }
function renderCategory(id){ const topic = topics.find(t=>t.id===id) || topics[0]; const list = articles.filter(a=>a.category===id); return `<section class="page"><div class="page-head"><div class="eyebrow">Section</div><h1>${h(topic.label)}</h1><p>${h(topic.desc)}</p></div><div class="page-body"><div class="article-list">${list.map(articleCard).join('') || `<div class="empty-state"><div><h3>No articles yet</h3><p>This section is ready for future publishing.</p></div></div>`}</div></div></section>`; }
function articleCard(a){ return `<article class="article-card" onclick="route('article',{article:'${a.id}'})"><div class="article-card-img" style="--card-bg:${a.image}"></div><div class="article-card-body"><span class="tag">${h(a.category)}</span><h3>${h(a.title)}</h3><p>${h(a.subtitle)}</p><div class="meta" style="margin-top:12px">${h(a.date)} · ${h(a.read)}</div></div></article>`; }
function renderPapers(){ return `<section class="page"><div class="page-head"><div class="eyebrow">Research & Papers</div><h1>Papers</h1><p>Formal research notes, working papers, citation-ready essays, and long-form arguments. This page is prepared for PDF uploads and admin-controlled publishing in the next backend stage.</p></div><div class="page-body"><div class="filter-row" style="margin-bottom:24px">${['All','Political Theory','Philosophy','Psychology','Geopolitics'].map((x,i)=>`<button class="filter-chip ${i===0?'active':''}" onclick="chipOnly(this)">${x}</button>`).join('')}</div><div class="article-list">${papers.map(p=>`<article class="article-card"><div class="article-card-body"><span class="tag">${h(p.tag)}</span><h3>${h(p.title)}</h3><p>${h(p.abstract)}</p><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:16px"><button class="ghost-button" onclick="toast('PDF upload ready in backend stage')">${svgIcon('papers')} PDF</button><button class="ghost-button" onclick="navigator.clipboard.writeText('${h(p.title)}').then(()=>toast('Citation copied'))">Cite</button></div></div></article>`).join('')}</div></div></section>`; }
function renderArchive(){ const months = [...articles].sort((a,b)=>new Date(b.date)-new Date(a.date)); return `<section class="page"><div class="page-head"><div class="eyebrow">Chronological Repository</div><h1>Archive</h1><p>A cleaner archive for every article, essay, paper, and note. It is intentionally simple so the content stays discoverable.</p></div><div class="page-body"><div class="saved-list">${months.map(a=>`<article class="archive-card" style="padding:18px" onclick="route('article',{article:'${a.id}'})"><div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start"><div><span class="tag">${h(a.category)}</span><h3 style="font-family:var(--font-display);font-size:25px;margin:9px 0 5px">${h(a.title)}</h3><p style="color:var(--muted);margin:0;line-height:1.55">${h(a.subtitle)}</p></div><div class="meta" style="white-space:nowrap">${h(a.date)}</div></div></article>`).join('')}</div></div></section>`; }
function renderSearch(){ const q=state.query.toLowerCase(); const pool=[...articles.map(a=>({...a,kind:'Article'})), ...papers.map(p=>({id:p.id,title:p.title,subtitle:p.abstract,category:p.tag,date:'2025',read:p.read,kind:'Paper'}))]; const results=pool.filter(x=>!q || `${x.title} ${x.subtitle} ${x.category} ${x.kind}`.toLowerCase().includes(q)); return `<section class="page"><div class="page-head"><div class="eyebrow">Discover</div><h1>Search</h1><div class="search-panel"><div class="searchbox">${svgIcon('search')}<input id="searchInput" value="${h(state.query)}" placeholder="Search Savarkar, philosophy, geopolitics, papers..." oninput="state.query=this.value;renderSearchResults()" autofocus /></div><div class="filter-row">${['all','history','philosophy','psychology','sociology','science','geopolitics','papers'].map(f=>`<button class="filter-chip ${state.filter===f?'active':''}" onclick="state.filter='${f}';renderSearchResults()">${f}</button>`).join('')}</div></div></div><div class="page-body"><div id="searchResults">${searchResultsHTML(results)}</div></div></section>`; }
function searchResultsHTML(results){ const filtered=results.filter(r=>state.filter==='all' || r.category.toLowerCase()===state.filter || (state.filter==='papers' && r.kind==='Paper')); return `<div class="result-list">${filtered.length?filtered.map(r=>`<article class="result-card" onclick="${r.kind==='Article'?`route('article',{article:'${r.id}'})`:`route('papers')`}"><div class="thumb-mini">${svgIcon(topics.find(t=>t.id===String(r.category).toLowerCase())?.icon || (r.kind==='Paper'?'papers':'search'))}</div><div><div class="meta">${h(r.kind)} · ${h(r.category)}</div><h3>${h(r.title)}</h3><p>${h(r.subtitle)}</p></div></article>`).join(''):`<div class="empty-state"><div><h3>No result found</h3><p>Try a broader term or browse the archive.</p></div></div>`}</div>`; }
function renderSearchResults(){ const box=document.getElementById('searchResults'); if(!box) return; const q=state.query.toLowerCase(); const pool=[...articles.map(a=>({...a,kind:'Article'})), ...papers.map(p=>({id:p.id,title:p.title,subtitle:p.abstract,category:p.tag,date:'2025',read:p.read,kind:'Paper'}))]; box.innerHTML=searchResultsHTML(pool.filter(x=>!q || `${x.title} ${x.subtitle} ${x.category} ${x.kind}`.toLowerCase().includes(q))); document.querySelectorAll('.filter-chip').forEach(b=>b.classList.toggle('active', b.textContent.trim().toLowerCase()===state.filter)); }
function renderSaved(){ return `<section class="page"><div class="page-head"><div class="eyebrow">Personal Library</div><h1>Saved</h1><p>Your saved articles are stored privately in this browser through localStorage.</p></div><div class="page-body"><div class="saved-list">${state.saved.length?state.saved.map(s=>`<article class="result-card" onclick="route('article',{article:'${s.id}'})"><div class="thumb-mini">${svgIcon(topics.find(t=>t.id===s.category)?.icon||'saved')}</div><div><div class="meta">${h(s.category)} · ${h(s.date)}</div><h3>${h(s.title)}</h3><button class="ghost-button" onclick="event.stopPropagation();toggleSave(${JSON.stringify(s)})">Remove</button></div></article>`).join(''):`<div class="empty-state"><div>${svgIcon('saved')}<h3>No saved articles yet</h3><p>Save something from the homepage or article reader.</p></div></div>`}</div></div></section>`; }
function renderSettingsButtons(){ document.querySelectorAll('[data-setting]').forEach(btn=>{ btn.classList.toggle('active', state[btn.dataset.setting]===btn.dataset.value); }); }
function renderSettings(){ return `<section class="page"><div class="page-head"><div class="eyebrow">Reader and Interface</div><h1>Settings</h1><p>Day/night mode is kept, but the interface now also has reader controls for aesthetic density, motion, article width, and accent color.</p></div><div class="page-body"><div class="settings-grid"><div class="setting-card"><h3>Theme</h3><p>Switch between warm day mode and midnight reading mode.</p><div class="segmented"><button data-setting="theme" data-value="day" onclick="setTheme('day')">Day</button><button data-setting="theme" data-value="night" onclick="setTheme('night')">Night</button></div></div><div class="setting-card"><h3>Density</h3><p>Choose between richer editorial spacing and a tighter compact layout.</p><div class="segmented"><button data-setting="density" data-value="editorial" onclick="setPref('density','editorial')">Editorial</button><button data-setting="density" data-value="compact" onclick="setPref('density','compact')">Compact</button></div></div><div class="setting-card"><h3>Motion</h3><p>Keep micro-animations or reduce motion for calmer reading.</p><div class="segmented"><button data-setting="motion" data-value="on" onclick="setPref('motion','on')">On</button><button data-setting="motion" data-value="off" onclick="setPref('motion','off')">Off</button></div></div><div class="setting-card"><h3>Reader Width</h3><p>Control how wide long-form articles feel.</p><div class="segmented"><button data-setting="reader" data-value="narrow" onclick="setPref('reader','narrow')">Narrow</button><button data-setting="reader" data-value="classic" onclick="setPref('reader','classic')">Classic</button><button data-setting="reader" data-value="wide" onclick="setPref('reader','wide')">Wide</button></div></div><div class="setting-card"><h3>Accent</h3><p>Subtle color identity for buttons, active states, and highlights.</p><div class="segmented"><button data-setting="accent" data-value="rose" onclick="setPref('accent','rose')">Rose</button><button data-setting="accent" data-value="gold" onclick="setPref('accent','gold')">Gold</button><button data-setting="accent" data-value="sage" onclick="setPref('accent','sage')">Sage</button></div></div><div class="setting-card"><h3>Local Data</h3><p>Clear saved articles and prototype preferences.</p><button class="ghost-button" onclick="localStorage.clear();location.reload()">Reset local data</button></div></div></div></section>`; }
function renderAbout(){ return `<section class="page"><div class="page-head"><div class="eyebrow">About</div><h1>Ānvīkṣikī</h1><p>Ānvīkṣikī means disciplined inquiry, reflective examination, and reasoned investigation. This site is designed as a serious journal for civilization, history, philosophy, psychology, sociology, science, and geopolitics.</p></div><div class="page-body"><div class="reader-main"><div style="text-align:center;margin:10px 0 28px">${emblem('emblem lg')}</div><section class="article-content"><p>This is not meant to look like a normal political blog. It is intended to feel like a revived intellectual institution: aesthetic, serious, mobile-first, readable, and capable of growing into a research archive.</p><h2>What the platform should do</h2><p>Publish essays, papers, refutations, long-form analysis, archives, citations, and modern strategic writing while preserving a rooted visual language.</p></section></div></div></section>`; }
function renderSubmit(){ return `<section class="page"><div class="page-head"><div class="eyebrow">Submissions</div><h1>Submit Writing</h1><p>A front-end submission flow ready to connect to a secure Replit backend later. For now, submissions are stored in this browser for prototype testing.</p></div><div class="page-body"><form class="form-panel" onsubmit="submitDraft(event)"><div class="form-row"><label>Name</label><input id="submitName" required placeholder="Your name" /></div><div class="form-row"><label>Email</label><input id="submitEmail" type="email" required placeholder="you@example.com" /></div><div class="form-row"><label>Type</label><select id="submitType"><option>Essay</option><option>Paper</option><option>Article pitch</option><option>Archive suggestion</option></select></div><div class="form-row"><label>Proposal</label><textarea id="submitMessage" required placeholder="Tell us the argument, sources, and why it belongs on Ānvīkṣikī."></textarea></div><button class="primary-button" type="submit">Submit Prototype Draft</button></form></div></section>`; }
function submitDraft(e){ e.preventDefault(); const drafts=JSON.parse(localStorage.getItem('anv_submissions')||'[]'); drafts.unshift({name:submitName.value,email:submitEmail.value,type:submitType.value,message:submitMessage.value,date:new Date().toISOString()}); localStorage.setItem('anv_submissions',JSON.stringify(drafts)); e.target.reset(); toast('Submission saved locally'); }
function renderAdmin(){ const submissions=JSON.parse(localStorage.getItem('anv_submissions')||'[]'); if(!state.admin){ return `<section class="page"><div class="page-head"><div class="eyebrow">Prototype Admin</div><h1>Admin</h1><p>This is a local prototype admin screen. For real security, connect it to a server-side Replit backend with secure sessions, CSRF protection, rate limiting, and a database.</p></div><div class="page-body"><form class="form-panel" onsubmit="adminLogin(event)"><div class="form-row"><label>Prototype password</label><input id="adminPass" type="password" placeholder="Enter prototype password" /></div><button class="primary-button">Enter Admin</button><p class="meta">Prototype password: anvikshiki</p></form></div></section>`; } return `<section class="page"><div class="page-head"><div class="eyebrow">Prototype Admin</div><h1>Dashboard</h1><p>Local CMS preview for content planning and Replit handoff.</p></div><div class="page-body"><div class="settings-grid"><div class="setting-card"><h3>${articles.length}</h3><p>Articles in prototype</p></div><div class="setting-card"><h3>${papers.length}</h3><p>Papers in prototype</p></div><div class="setting-card"><h3>${submissions.length}</h3><p>Local submissions</p></div></div><div class="admin-card"><h2 style="font-family:var(--font-display);margin-top:0">Submissions</h2><div class="admin-list">${submissions.length?submissions.map(s=>`<div class="admin-item"><div><strong>${h(s.type)}</strong><br><span class="meta">${h(s.name)} · ${h(s.email)}</span><p style="margin:8px 0 0;color:var(--muted)">${h(s.message)}</p></div></div>`).join(''):'<p class="meta">No local submissions yet.</p>'}</div></div></div></section>`; }
function adminLogin(e){ e.preventDefault(); if(adminPass.value==='anvikshiki'){ state.admin=true; localStorage.setItem('anv_admin','true'); render(); } else toast('Wrong prototype password'); }
function chipOnly(el){ el.parentElement.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('active')); el.classList.add('active'); }
function render(){ applyPrefs(); activeNav(); let html=''; if(state.view==='home') html=renderHome(); else if(state.view==='article') html=renderArticle(state.article||articles[0].id); else if(state.view==='category') html=renderCategory(state.category||'history'); else if(state.view==='papers') html=renderPapers(); else if(state.view==='archive') html=renderArchive(); else if(state.view==='search') html=renderSearch(); else if(state.view==='saved') html=renderSaved(); else if(state.view==='settings') html=renderSettings(); else if(state.view==='about') html=renderAbout(); else if(state.view==='submit') html=renderSubmit(); else if(state.view==='admin') html=renderAdmin(); else html=renderHome(); document.getElementById('main').innerHTML=html; initIcons(); applyPrefs(); activeNav(); renderSettingsButtons(); }
window.addEventListener('scroll',()=>{ const doc=document.documentElement; const max=doc.scrollHeight-doc.clientHeight; const p=max>0?(doc.scrollTop/max)*100:0; document.getElementById('readerBar').style.setProperty('--readProgress',p+'%'); });
function makePetals(){ const wrap=document.getElementById('petals'); if(!wrap) return; wrap.innerHTML=''; for(let i=0;i<16;i++){ const p=document.createElement('span'); p.className='petal'; p.style.left=(Math.random()*100)+'%'; p.style.animationDuration=(14+Math.random()*18)+'s'; p.style.animationDelay=(-Math.random()*20)+'s'; p.style.opacity=(.08+Math.random()*.18).toFixed(2); wrap.appendChild(p); } }
window.addEventListener('hashchange',()=>{ const id=location.hash.replace('#',''); if(id){ const a=articles.find(x=>x.id===id); if(a) route('article',{article:id}); } });
applyPrefs(); makePetals(); render(); const initialHash=location.hash.replace('#',''); if(initialHash && articles.some(a=>a.id===initialHash)) route('article',{article:initialHash});
</script>
</body>
</html>
