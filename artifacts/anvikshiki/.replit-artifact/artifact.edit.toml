kind = "web"
previewPath = "/"
title = "Anvikshiki — Journal & Research Platform"
version = "1.0.0"
id = "artifacts/anvikshiki"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24483

[services.development]
run = "pnpm --filter @workspace/anvikshiki run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/anvikshiki", "run", "build" ]
serve = "static"
publicDir = "artifacts/anvikshiki/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24483"
BASE_PATH = "/"
